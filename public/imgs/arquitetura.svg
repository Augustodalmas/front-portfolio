<svg width="100%" viewBox="0 0 1160 600" role="img" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Arial, sans-serif">
<title>Arquitetura do projeto CS2 Data Engineering</title>
<desc>Pipeline medalhão (bronze em Parquet; silver/gold em dbt+DuckDB), exportação da gold pra Parquet, e uma API Django/DRF (3 réplicas) servida atrás de um load balancer Nginx, com cache Redis e upload assíncrono de demos via Celery. A API (qualquer uma das 3 réplicas) lê o Parquet exportado e fala com o Redis (cache no GET, fila no POST). O POST segue Cliente → Nginx → API → Redis (fila) → Celery worker → Ingestão (Bronze Parquet).</desc>

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#5f5e5a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-o" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#b45309" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-p" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#7c3aed" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect x="0" y="0" width="1160" height="600" fill="white"/>

<!-- ============ SEÇÃO 1: PIPELINE DE DADOS ============ -->
<rect x="20" y="20" width="1120" height="160" rx="14" fill="none" stroke="#5f5e5a" stroke-width="0.75" stroke-dasharray="5 5" opacity="0.5"/>
<text x="40" y="44" font-size="13" font-weight="700" fill="#3d3d3a">PIPELINE DE DADOS (batch — dbt + DuckDB, roda sob demanda)</text>

<rect x="40" y="60" width="200" height="50" rx="8" fill="#f1efe8" stroke="#5f5e5a" stroke-width="0.75"/>
<text x="140" y="84" text-anchor="middle" font-size="14" font-weight="700" fill="#3d3d3a">Ingestão</text>
<text x="140" y="101" text-anchor="middle" font-size="10" fill="#5f5e5a">→ Bronze (Parquet)</text>

<line x1="240" y1="85" x2="284" y2="85" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="290" y="60" width="200" height="50" rx="8" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.75"/>
<text x="390" y="90" text-anchor="middle" font-size="14" font-weight="700" fill="#085041">Silver (dbt)</text>

<line x1="490" y1="85" x2="534" y2="85" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="540" y="60" width="200" height="50" rx="8" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.75"/>
<text x="640" y="90" text-anchor="middle" font-size="14" font-weight="700" fill="#085041">Gold (dbt)</text>

<line x1="740" y1="85" x2="784" y2="85" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="790" y="60" width="200" height="50" rx="8" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.75"/>
<text x="890" y="90" text-anchor="middle" font-size="14" font-weight="700" fill="#085041">Export Parquet</text>

<!-- Export Parquet -> desce até a API -->
<line x1="890" y1="110" x2="890" y2="192" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- ============ SEÇÃO 2: API DE CONSUMO ============ -->
<rect x="20" y="190" width="1120" height="370" rx="14" fill="none" stroke="#185fa5" stroke-width="0.75" stroke-dasharray="5 5" opacity="0.5"/>
<text x="40" y="214" font-size="13" font-weight="700" fill="#0c447c">API DE CONSUMO (sempre no ar — docker-compose: Nginx + API + Redis + Celery)</text>

<!-- Coluna esquerda: caminho do POST, direto embaixo da Ingestão -->
<rect x="40" y="230" width="200" height="50" rx="8" fill="#fef3e2" stroke="#b45309" stroke-width="0.75"/>
<text x="140" y="260" text-anchor="middle" font-size="14" font-weight="700" fill="#7c2d12">Celery worker</text>

<!-- Worker -> Ingestão -->
<line x1="140" y1="230" x2="140" y2="114" stroke="#b45309" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arrow-o)"/>

<!-- Redis -> Worker -->
<line x1="140" y1="350" x2="140" y2="284" stroke="#b45309" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arrow-o)"/>

<rect x="40" y="350" width="200" height="50" rx="8" fill="#f1edfc" stroke="#7c3aed" stroke-width="0.75"/>
<text x="140" y="380" text-anchor="middle" font-size="14" font-weight="700" fill="#4c1d95">Redis</text>

<!-- Cliente -->
<rect x="300" y="230" width="150" height="50" rx="8" fill="#f1efe8" stroke="#5f5e5a" stroke-width="0.75"/>
<text x="375" y="260" text-anchor="middle" font-size="14" font-weight="700" fill="#3d3d3a">Cliente</text>

<line x1="450" y1="255" x2="494" y2="255" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Nginx -->
<rect x="500" y="230" width="150" height="50" rx="8" fill="#e6f1fb" stroke="#185fa5" stroke-width="0.75"/>
<text x="575" y="260" text-anchor="middle" font-size="14" font-weight="700" fill="#0c447c">Nginx</text>

<!-- Nginx -> API (container único) -->
<line x1="650" y1="255" x2="774" y2="285" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- API: container único, com as 3 réplicas dentro -->
<rect x="780" y="195" width="220" height="180" rx="12" fill="#eef5fc" stroke="#185fa5" stroke-width="1"/>
<text x="890" y="215" text-anchor="middle" font-size="13" font-weight="700" fill="#0c447c">API</text>

<rect x="800" y="228" width="180" height="36" rx="6" fill="#e6f1fb" stroke="#185fa5" stroke-width="0.75"/>
<text x="890" y="251" text-anchor="middle" font-size="11" fill="#0c447c">réplica 1</text>

<rect x="800" y="270" width="180" height="36" rx="6" fill="#e6f1fb" stroke="#185fa5" stroke-width="0.75"/>
<text x="890" y="293" text-anchor="middle" font-size="11" fill="#0c447c">réplica 2</text>

<rect x="800" y="312" width="180" height="36" rx="6" fill="#e6f1fb" stroke="#185fa5" stroke-width="0.75"/>
<text x="890" y="335" text-anchor="middle" font-size="11" fill="#0c447c">réplica 3</text>

<!-- API -> Redis -->
<line x1="780" y1="330" x2="242" y2="368" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-p)"/>

<!-- ============ LEGENDA ============ -->
<rect x="40" y="460" width="1060" height="110" rx="10" fill="#faf9f6" stroke="#e3e1d9" stroke-width="0.75"/>
<text x="60" y="484" font-size="12" font-weight="700" fill="#3d3d3a">Legenda</text>

<line x1="60" y1="504" x2="94" y2="504" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="102" y="508" font-size="11" fill="#3d3d3a">fluxo síncrono (request/response, leitura direta)</text>

<line x1="60" y1="526" x2="94" y2="526" stroke="#b45309" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arrow-o)"/>
<text x="102" y="530" font-size="11" fill="#3d3d3a">fluxo assíncrono do POST (fila Celery / job em background)</text>

<line x1="60" y1="548" x2="94" y2="548" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-p)"/>
<text x="102" y="552" font-size="11" fill="#3d3d3a">API ↔ Redis (cache no GET, fila no POST)</text>

<rect x="600" y="496" width="16" height="16" rx="3" fill="#f1efe8" stroke="#5f5e5a" stroke-width="0.75"/>
<text x="624" y="508" font-size="11" fill="#3d3d3a">pipeline batch (dbt / DuckDB)</text>

<rect x="600" y="518" width="16" height="16" rx="3" fill="#e6f1fb" stroke="#185fa5" stroke-width="0.75"/>
<text x="624" y="530" font-size="11" fill="#3d3d3a">API (Django/DRF + Nginx)</text>

<rect x="850" y="496" width="16" height="16" rx="3" fill="#f1edfc" stroke="#7c3aed" stroke-width="0.75"/>
<text x="874" y="508" font-size="11" fill="#3d3d3a">Redis (cache + broker)</text>

<rect x="850" y="518" width="16" height="16" rx="3" fill="#fef3e2" stroke="#b45309" stroke-width="0.75"/>
<text x="874" y="530" font-size="11" fill="#3d3d3a">upload assíncrono (Celery)</text>

</svg>
