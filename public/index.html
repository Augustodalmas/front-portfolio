<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="/imgs/logo-dalmas-full.png" type="image/png" />
  <title>Augusto Dalmas — Desenvolvedor Backend & Dados</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --shell: #4FC3D9;
      --shell-deep: #1E6B85;
      --shell-glow: rgba(79, 195, 217, 0.18);
      --bg: #07090b;
      --surface: #11161b;
      --ink: #f4f6f7;
      --ink-dim: rgba(244, 246, 247, 0.62);
      --ink-faint: rgba(244, 246, 247, 0.36);
      --line: rgba(244, 246, 247, 0.08);
      --line-strong: rgba(244, 246, 247, 0.16);
      --font-display: 'Instrument Serif', Georgia, serif;
      --font-sans: 'Geist', system-ui, sans-serif;
      --font-mono: 'Geist Mono', monospace;
      --r-pill: 999px;
      --r-card: 14px;
    }
  </style>
</head>

<body>
  <div id="root"></div>
</body>

</html>
